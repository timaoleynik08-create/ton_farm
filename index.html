<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Samsa Tap</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(180deg, #0f172a, #1e3a8a);
    color: white;
    text-align: center;
    overflow: hidden;
    touch-action: manipulation;
}

.top {
    margin-top: 20px;
    font-size: 18px;
}

.bar {
    width: 80%;
    height: 12px;
    background: #333;
    margin: 8px auto;
    border-radius: 10px;
    overflow: hidden;
}

.fill {
    height: 100%;
    background: orange;
    width: 0%;
}

#tandoor {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 220px;
    height: 220px;
}

#tandoor img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
}

#effect img {
    position: absolute;
    width: 35px;
    pointer-events: none;
    animation: fly 1s forwards;
}

@keyframes fly {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-140px); opacity: 0; }
}
</style>
</head>

<body>

<div class="top">
    <div id="name">Игрок</div>
    💰 Баланс: <span id="balance">0</span>

    <div>⚡ Энергия <span id="energyText"></span></div>
    <div class="bar"><div id="energyBar" class="fill"></div></div>

    <div>📈 Уровень: <span id="levelText">1</span></div>
    <div class="bar"><div id="levelBar" class="fill"></div></div>
</div>

<div id="effect"></div>

<div id="tandoor">
    <img src="assets/tandoor.png">
</div>

<script>

// ===== TELEGRAM =====
if (window.Telegram?.WebApp) {
    Telegram.WebApp.expand();

    const user = Telegram.WebApp.initDataUnsafe?.user;
    if (user) {
        document.getElementById("name").innerText = user.first_name;
    }
}

// ===== ДАННЫЕ =====
let balance = parseInt(localStorage.getItem("balance")) || 0;
let energy = parseInt(localStorage.getItem("energy")) || 10;
let level = parseInt(localStorage.getItem("level")) || 1;
let maxEnergy = parseInt(localStorage.getItem("maxEnergy")) || 10;

// ===== UI =====
function updateUI() {
    document.getElementById("balance").innerText = balance;
    document.getElementById("energyText").innerText = energy + "/" + maxEnergy;
    document.getElementById("levelText").innerText = level;

    document.getElementById("energyBar").style.width =
        (energy / maxEnergy * 100) + "%";

    let need = level * 10;
    let progress = balance % need;

    document.getElementById("levelBar").style.width =
        (progress / need * 100) + "%";
}

// ===== СОХРАНЕНИЕ =====
function save() {
    localStorage.setItem("balance", balance);
    localStorage.setItem("energy", energy);
    localStorage.setItem("level", level);
    localStorage.setItem("maxEnergy", maxEnergy);
}

// ===== ТАП =====
document.getElementById("tandoor").addEventListener("click", (e) => {

    if (energy <= 0) return;

    balance++;
    energy--;

    if (balance >= level * 10) {
        level++;
        maxEnergy += 2;
    }

    updateUI();
    save();
    spawnSamsa(e);
});

// ===== САМСА =====
function spawnSamsa(e) {
    let el = document.createElement("img");
    el.src = "assets/samsa.png";

    el.style.left = (e.clientX - 15) + "px";
    el.style.top = (e.clientY - 15) + "px";

    document.getElementById("effect").appendChild(el);

    setTimeout(() => el.remove(), 1000);
}

// ===== ЭНЕРГИЯ =====
setInterval(() => {
    if (energy < maxEnergy) {
        energy++;
        updateUI();
        save();
    }
}, 2000);

// ===== УБРАТЬ ZOOM =====
let lastTouchEnd = 0;
document.addEventListener('touchend', function (event) {
    let now = (new Date()).getTime();
    if (now - lastTouchEnd <= 300) {
        event.preventDefault();
    }
    lastTouchEnd = now;
}, false);

// ===== СТАРТ =====
updateUI();

</script>

</body>
</html>
