<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>TON Farm</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root{
    --bg1: #081426;
    --bg2: #12315f;
    --card: rgba(255,255,255,0.08);
    --card2: rgba(255,255,255,0.12);
    --text: #ffffff;
    --muted: rgba(255,255,255,0.78);
    --gold1: #ffcb45;
    --gold2: #ff9f1a;
    --shadow: rgba(0,0,0,0.35);
}

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: var(--text);
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    background: url("assets/bg.jpg") center center / cover no-repeat fixed;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
}

* { box-sizing: border-box; }

body::before{
    content:"";
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, rgba(8,20,38,0.46), rgba(8,20,38,0.16));
    pointer-events: none;
}

#effect-layer{
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 20;
}

.top {
    position: relative;
    z-index: 5;
    padding: 14px 14px 0;
    text-align: center;
}

.name {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 12px;
    line-height: 1.1;
    text-shadow: 0 2px 10px rgba(0,0,0,0.4);
}

.stat {
    font-size: 18px;
    margin: 10px 0 6px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.4);
}

.bar {
    width: min(78vw, 520px);
    height: 12px;
    background: rgba(255,255,255,0.18);
    margin: 0 auto 16px;
    border-radius: 999px;
    overflow: hidden;
    backdrop-filter: blur(2px);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
}

.fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--gold1), var(--gold2));
    border-radius: 999px;
    transition: width 0.15s linear;
}

.shop-button {
    position: fixed;
    top: max(10px, env(safe-area-inset-top));
    right: 10px;
    z-index: 50;
    border: none;
    border-radius: 16px;
    background: rgba(255,255,255,0.12);
    color: white;
    font-size: 16px;
    padding: 12px 14px;
    font-weight: 700;
    box-shadow: 0 8px 20px var(--shadow);
    backdrop-filter: blur(10px);
}

.shop-button:active{
    transform: scale(0.98);
}

.game-area {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 24px;
    display: flex;
    justify-content: center;
    pointer-events: none;
    z-index: 5;
}

#tandoor {
    width: min(64vw, 280px);
    max-width: 280px;
    aspect-ratio: 1 / 1;
    pointer-events: auto;
    user-select: none;
    -webkit-user-drag: none;
    touch-action: manipulation;
    cursor: pointer;
    transition: transform 0.08s ease;
    background: transparent;
    border: none;
    outline: none;
    padding: 0;
    filter: drop-shadow(0 0 34px rgba(255, 140, 0, 0.34));
}

#tandoor:active {
    transform: scale(0.95);
}

#tandoor img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: transparent;
    border: none;
    outline: none;
}

#girl {
    position: fixed;
    right: 5vw;
    bottom: 30px;
    width: min(32vw, 180px);
    max-width: 180px;
    height: auto;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;
    display: none;
    filter: drop-shadow(0 8px 22px rgba(0,0,0,0.35));
    z-index: 4;
}

.samsa-fly {
    position: absolute;
    width: 42px;
    height: 42px;
    object-fit: contain;
    animation: flyUp 900ms ease-out forwards;
    will-change: transform, opacity;
    z-index: 30;
}

@keyframes flyUp {
    0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
    100% { transform: translateY(-160px) scale(0.55) rotate(18deg); opacity: 0; }
}

.modal {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.62);
    backdrop-filter: blur(8px);
    z-index: 100;
    padding: 18px;
}

.modal-content {
    width: min(92vw, 430px);
    border-radius: 28px;
    padding: 18px;
    color: white;
    background: linear-gradient(180deg, rgba(19,40,80,0.98), rgba(9,21,43,0.98));
    box-shadow: 0 18px 55px rgba(0,0,0,0.45);
    border: 1px solid rgba(255,255,255,0.08);
}

.modal-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom: 14px;
}

.modal-head h2{
    margin:0;
    font-size: 22px;
}

.close {
    font-size: 30px;
    line-height: 1;
    cursor: pointer;
    color: rgba(255,255,255,0.82);
    user-select:none;
}

.shop-card{
    background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.06));
    border-radius: 24px;
    padding: 16px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
}

.shop-preview{
    width: 100%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom: 12px;
}

.shop-preview img{
    width: 160px;
    max-width: 100%;
    height: auto;
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.25));
    user-select:none;
}

.shop-title{
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 6px;
    text-align:center;
}

.shop-meta{
    text-align:center;
    color: var(--muted);
    font-size: 15px;
    line-height: 1.45;
    margin-bottom: 14px;
}

.shop-actions{
    display:grid;
    grid-template-columns: 1fr;
    gap: 10px;
}

.shop-actions button{
    width:100%;
    padding: 14px 14px;
    border:none;
    border-radius: 16px;
    font-size: 16px;
    font-weight: 700;
    cursor:pointer;
    color:white;
}

.primary-btn{
    background: linear-gradient(90deg, #ffb000, #ff8a00);
    box-shadow: 0 10px 24px rgba(255,153,0,0.25);
}

.secondary-btn{
    background: rgba(255,255,255,0.12);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
}

.secondary-btn:disabled,
.primary-btn:disabled{
    opacity: 0.45;
    cursor: not-allowed;
}

@media (max-height: 700px) {
    .name { font-size: 24px; margin-bottom: 10px; }
    .stat { font-size: 16px; margin: 8px 0 5px; }
    .bar { margin-bottom: 12px; }
    #girl { width: min(28vw, 150px); right: 3vw; bottom: 18px; }
}
@media (max-width: 430px) {
    #girl { width: min(30vw, 145px); }
}
</style>
</head>

<body>
<button class="shop-button" id="shopBtn">🛒 Магазин</button>

<div class="top">
    <div class="name" id="playerName">Игрок</div>

    <div class="stat">💰 Баланс: <span id="balance">0</span></div>

    <div class="stat">⚡ Энергия: <span id="energyText">10/10</span></div>
    <div class="bar"><div id="energyBar" class="fill"></div></div>

    <div class="stat">📈 Уровень: <span id="levelText">1</span></div>
    <div class="bar"><div id="levelBar" class="fill"></div></div>
</div>

<div id="effect-layer"></div>

<div class="game-area">
    <button id="tandoor" aria-label="Tandoor tap">
        <img src="assets/tandoor.png" alt="tandoor">
    </button>
</div>

<img id="girl" src="" alt="girl">

<div id="shopModal" class="modal">
    <div class="modal-content">
        <div class="modal-head">
            <h2>🛒 Магазин</h2>
            <div class="close" id="closeModal">&times;</div>
        </div>

        <div class="shop-card">
            <div class="shop-preview">
                <img id="itemGirlImg" src="assets/girl1.png" alt="girl item">
            </div>

            <div class="shop-title">Девушка-помощница</div>

            <div class="shop-meta">
                Уровень: <span id="girlLevelDisplay">0</span>/10<br>
                Доход: +<span id="girlIncomeDisplay">0</span> самс/сек<br>
                Цена: <span id="girlPrice">1000</span> самс
            </div>

            <div class="shop-actions">
                <button id="buyGirlBtn" class="primary-btn">Купить</button>
                <button id="upgradeGirlBtn" class="secondary-btn" style="display:none;">Улучшить</button>
            </div>
        </div>
    </div>
</div>

<script>
(() => {
    const balanceEl = document.getElementById('balance');
    const energyTextEl = document.getElementById('energyText');
    const energyBarEl = document.getElementById('energyBar');
    const levelTextEl = document.getElementById('levelText');
    const levelBarEl = document.getElementById('levelBar');
    const playerNameEl = document.getElementById('playerName');

    const tandoorEl = document.getElementById('tandoor');
    const girlEl = document.getElementById('girl');
    const effectLayer = document.getElementById('effect-layer');

    const shopBtn = document.getElementById('shopBtn');
    const shopModal = document.getElementById('shopModal');
    const closeModal = document.getElementById('closeModal');
    const buyGirlBtn = document.getElementById('buyGirlBtn');
    const upgradeGirlBtn = document.getElementById('upgradeGirlBtn');
    const girlLevelDisplay = document.getElementById('girlLevelDisplay');
    const girlPriceDisplay = document.getElementById('girlPrice');
    const girlIncomeDisplay = document.getElementById('girlIncomeDisplay');
    const itemGirlImg = document.getElementById('itemGirlImg');

    const STORAGE_KEYS = {
        balance: 'tonfarm_balance',
        energy: 'tonfarm_energy',
        name: 'tonfarm_name',
        girlBought: 'tonfarm_girlBought',
        girlLevel: 'tonfarm_girlLevel',
        lastTimestamp: 'tonfarm_lastTimestamp'
    };

    const girlPrices = [0, 1000, 2000, 5000, 10000, 20000, 50000, 100000, 200000, 500000, 1000000];
    const girlIncome = [0, 1, 2, 4, 8, 16, 25, 35, 40, 45, 50];

    let balance = parseInt(localStorage.getItem(STORAGE_KEYS.balance) || '0', 10);
    let energy = parseInt(localStorage.getItem(STORAGE_KEYS.energy) || '10', 10);
    let girlBought = localStorage.getItem(STORAGE_KEYS.girlBought) === 'true';
    let girlLevel = parseInt(localStorage.getItem(STORAGE_KEYS.girlLevel) || '0', 10);
    let lastTimestamp = parseInt(localStorage.getItem(STORAGE_KEYS.lastTimestamp) || String(Date.now()), 10);

    function getLevel(currentBalance) {
        return Math.floor(currentBalance / 10) + 1;
    }

    function getLevelProgress(currentBalance) {
        return currentBalance % 10;
    }

    function getMaxEnergy(level) {
        return 10 + (level - 1) * 2;
    }

    function saveGame() {
        localStorage.setItem(STORAGE_KEYS.balance, String(balance));
        localStorage.setItem(STORAGE_KEYS.energy, String(energy));
        localStorage.setItem(STORAGE_KEYS.girlBought, String(girlBought));
        localStorage.setItem(STORAGE_KEYS.girlLevel, String(girlLevel));
        localStorage.setItem(STORAGE_KEYS.lastTimestamp, String(lastTimestamp));
    }

    function updateUI() {
        const level = getLevel(balance);
        const progress = getLevelProgress(balance);
        const maxEnergy = getMaxEnergy(level);

        if (energy > maxEnergy) energy = maxEnergy;

        balanceEl.textContent = balance;
        energyTextEl.textContent = `${energy}/${maxEnergy}`;
        levelTextEl.textContent = level;

        energyBarEl.style.width = `${(energy / maxEnergy) * 100}%`;
        levelBarEl.style.width = `${(progress / 10) * 100}%`;
    }

    function setPlayerName() {
        try {
            if (window.Telegram && Telegram.WebApp) {
                Telegram.WebApp.ready();
                Telegram.WebApp.expand();

                const user = Telegram.WebApp.initDataUnsafe?.user;
                if (user) {
                    const fullName = [user.first_name, user.last_name].filter(Boolean).join(' ');
                    playerNameEl.textContent = fullName || 'Игрок';
                    localStorage.setItem(STORAGE_KEYS.name, fullName || 'Игрок');
                    return;
                }
            }
        } catch (e) {}

        const savedName = localStorage.getItem(STORAGE_KEYS.name);
        if (savedName) playerNameEl.textContent = savedName;
    }

    function refreshGirlUI() {
        girlLevelDisplay.textContent = girlLevel;
        girlIncomeDisplay.textContent = girlLevel > 0 ? girlIncome[girlLevel] : 0;

        if (!girlBought) {
            buyGirlBtn.style.display = 'inline-block';
            upgradeGirlBtn.style.display = 'none';
            girlPriceDisplay.textContent = girlPrices[1];
            itemGirlImg.src = 'assets/girl1.png';
        } else {
            buyGirlBtn.style.display = 'none';

            if (girlLevel < 10) {
                upgradeGirlBtn.style.display = 'inline-block';
                const nextLevel = girlLevel + 1;
                girlPriceDisplay.textContent = girlPrices[nextLevel];
                upgradeGirlBtn.textContent = `Улучшить до ${nextLevel}`;
                itemGirlImg.src = `assets/girl${girlLevel}.png`;
            } else {
                upgradeGirlBtn.style.display = 'none';
                girlPriceDisplay.textContent = '—';
                itemGirlImg.src = `assets/girl${girlLevel}.png`;
            }
        }

        if (girlBought && girlLevel > 0) {
            girlEl.src = `assets/girl${girlLevel}.png`;
            girlEl.style.display = 'block';
        } else {
            girlEl.style.display = 'none';
        }
    }

    function spawnSamsa(x, y) {
        const img = document.createElement('img');
        img.src = 'assets/samsa.png';
        img.className = 'samsa-fly';
        img.style.left = `${Math.max(0, x - 21)}px`;
        img.style.top = `${Math.max(0, y - 21)}px`;
        effectLayer.appendChild(img);
        setTimeout(() => img.remove(), 950);
    }

    function tap(event) {
        if (energy <= 0) return;

        balance += 1;
        energy -= 1;
        lastTimestamp = Date.now();
        saveGame();
        updateUI();

        const rect = tandoorEl.getBoundingClientRect();
        const x = event?.clientX ?? (rect.left + rect.width / 2);
        const y = event?.clientY ?? (rect.top + rect.height / 2);

        spawnSamsa(x, y);
    }

    tandoorEl.addEventListener('click', (e) => {
        e.preventDefault();
        tap(e);
    });

    tandoorEl.addEventListener('touchend', (e) => {
        e.preventDefault();
        const t = e.changedTouches && e.changedTouches[0];
        tap(t || e);
    }, { passive: false });

    shopBtn.addEventListener('click', () => {
        shopModal.style.display = 'flex';
        refreshGirlUI();
    });

    closeModal.addEventListener('click', () => {
        shopModal.style.display = 'none';
    });

    shopModal.addEventListener('click', (e) => {
        if (e.target === shopModal) shopModal.style.display = 'none';
    });

    buyGirlBtn.addEventListener('click', () => {
        if (balance >= girlPrices[1]) {
            balance -= girlPrices[1];
            girlBought = true;
            girlLevel = 1;
            lastTimestamp = Date.now();
            saveGame();
            updateUI();
            refreshGirlUI();
        }
    });

    upgradeGirlBtn.addEventListener('click', () => {
        const nextLevel = girlLevel + 1;
        if (nextLevel > 10) return;

        if (balance >= girlPrices[nextLevel]) {
            balance -= girlPrices[nextLevel];
            girlLevel = nextLevel;
            lastTimestamp = Date.now();
            saveGame();
            updateUI();
            refreshGirlUI();
        }
    });

    function applyOfflineIncome() {
        if (!girlBought || girlLevel <= 0) return;

        const now = Date.now();
        const deltaSec = Math.floor((now - lastTimestamp) / 1000);

        if (deltaSec > 0) {
            balance += deltaSec * girlIncome[girlLevel];
            lastTimestamp = now;
            saveGame();
        }
    }

    function autoIncomeTick() {
        if (girlBought && girlLevel > 0) {
            balance += girlIncome[girlLevel];
            saveGame();
            updateUI();
        }
    }

    setPlayerName();
    applyOfflineIncome();
    updateUI();
    refreshGirlUI();

    setInterval(() => {
        const maxEnergy = getMaxEnergy(getLevel(balance));
        if (energy < maxEnergy) {
            energy += 1;
            updateUI();
            saveGame();
        }
    }, 1000);

    setInterval(autoIncomeTick, 1000);

    document.addEventListener('gesturestart', e => e.preventDefault());
    document.addEventListener('dblclick', e => e.preventDefault());
})();
</script>
</body>
</html>
