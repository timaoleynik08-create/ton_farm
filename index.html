<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="
width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no
">

<title>TON Farm</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(180deg, #0f172a, #1e3a8a);
    color: white;
    text-align: center;
    overflow: hidden;
    touch-action: manipulation;
}

/* верх */
.top {
    margin-top: 20px;
}

/* полосы */
.bar {
    width: 80%;
    height: 12px;
    background: #333;
    margin: 8px auto;
    border-radius: 10px;
    overflow: hidden;
}

.fill {
    height: 100%;
    background: orange;
}

/* тандыр */
#tandoor {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 220px;
}

#tandoor img {
    width: 100%;
}

/* эффект самсы */
#effect img {
    position: absolute;
    width: 40px;
    animation: fly 1s forwards;
}

@keyframes fly {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-120px); opacity: 0; }
}
</style>
</head>

<body>

<div class="top">
    <h2 id="name">Игрок</h2>

    💰 Баланс: <span id="balance">0</span>

    <div>⚡ Энергия</div>
    <div class="bar"><div id="energyBar" class="fill"></div></div>

    <div>📈 Уровень</div>
    <div class="bar"><div id="levelBar" class="fill"></div></div>
</div>

<div id="effect"></div>

<div id="tandoor" onclick="tap()">
    <img src="https://i.postimg.cc/3r8m1F0F/tandoor.png">
</div>

<script>
let balance = 0;
let energy = 10;
let level = 1;
let maxEnergy = 10;

/* Telegram имя */
if (window.Telegram?.WebApp) {
    let user = Telegram.WebApp.initDataUnsafe.user;
    if (user) {
        document.getElementById("name").innerText = user.first_name;
    }
}

/* загрузка */
balance = +localStorage.getItem("balance") || 0;
energy = +localStorage.getItem("energy") || 10;
level = +localStorage.getItem("level") || 1;
maxEnergy = +localStorage.getItem("maxEnergy") || 10;

/* обновление UI */
function updateUI() {
    document.getElementById("balance").innerText = balance;

    document.getElementById("energyBar").style.width =
        (energy / maxEnergy * 100) + "%";

    document.getElementById("levelBar").style.width =
        ((balance % (level * 10)) / (level * 10)) * 100 + "%";
}

/* сохранение */
function save() {
    localStorage.setItem("balance", balance);
    localStorage.setItem("energy", energy);
    localStorage.setItem("level", level);
    localStorage.setItem("maxEnergy", maxEnergy);
}

/* тап */
function tap() {
    if (energy <= 0) return;

    balance++;
    energy--;

    if (balance >= level * 10) {
        level++;
        maxEnergy += 2;
    }

    spawnSamsa();
    updateUI();
    save();
}

/* самса */
function spawnSamsa() {
    let el = document.createElement("img");
    el.src = "https://i.postimg.cc/1tW8K3Yh/samsa.png";

    el.style.left = Math.random() * 80 + 10 + "%";
    el.style.bottom = "140px";

    document.getElementById("effect").appendChild(el);

    setTimeout(() => el.remove(), 1000);
}

/* восстановление энергии */
setInterval(() => {
    if (energy < maxEnergy) {
        energy++;
        updateUI();
        save();
    }
}, 3000);

/* отключение зума */
let lastTouchEnd = 0;
document.addEventListener('touchend', function (event) {
    let now = Date.now();
    if (now - lastTouchEnd <= 300) {
        event.preventDefault();
    }
    lastTouchEnd = now;
}, false);

/* старт */
updateUI();
</script>

</body>
</html>
