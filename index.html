<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>TON Farm</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #0b1f3a 0%, #1e3c72 100%);
    color: white;
    text-align: center;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
}

* {
    box-sizing: border-box;
}

.top {
    padding: 18px 14px 0;
}

.name {
    font-size: 30px;
    font-weight: 700;
    margin-bottom: 18px;
}

.stat {
    font-size: 18px;
    margin: 10px 0 6px;
}

.bar {
    width: min(78vw, 520px);
    height: 12px;
    background: rgba(255,255,255,0.16);
    margin: 0 auto 16px;
    border-radius: 999px;
    overflow: hidden;
}

.fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ffb000, #ff8a00);
    border-radius: 999px;
    transition: width 0.15s linear;
}

.game-area {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 24px;
    display: flex;
    justify-content: center;
    pointer-events: none;
}

#tandoor {
    width: min(64vw, 280px);
    max-width: 280px;
    aspect-ratio: 1 / 1;
    pointer-events: auto;
    user-select: none;
    -webkit-user-drag: none;
    touch-action: manipulation;
    cursor: pointer;
    transition: transform 0.08s ease;
    filter: drop-shadow(0 0 28px rgba(255, 170, 0, 0.28));
}

#tandoor:active {
    transform: scale(0.95);
}

#effect-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
}

.samsa-fly {
    position: absolute;
    width: 42px;
    height: 42px;
    object-fit: contain;
    animation: flyUp 900ms ease-out forwards;
    will-change: transform, opacity;
}

@keyframes flyUp {
    0% {
        transform: translateY(0) scale(1) rotate(0deg);
        opacity: 1;
    }
    100% {
        transform: translateY(-160px) scale(0.55) rotate(18deg);
        opacity: 0;
    }
}

@media (max-height: 700px) {
    .name {
        font-size: 26px;
        margin-bottom: 12px;
    }
    .stat {
        font-size: 16px;
    }
    .bar {
        margin-bottom: 12px;
    }
}
</style>
</head>

<body>
    <div class="top">
        <div class="name" id="playerName">Игрок</div>

        <div class="stat">💰 Баланс: <span id="balance">0</span></div>

        <div class="stat">⚡ Энергия: <span id="energyText">10/10</span></div>
        <div class="bar"><div id="energyBar" class="fill"></div></div>

        <div class="stat">📈 Уровень: <span id="levelText">1</span></div>
        <div class="bar"><div id="levelBar" class="fill"></div></div>
    </div>

    <div id="effect-layer"></div>

    <div class="game-area">
        <img id="tandoor" src="assets/tandoor.png" alt="tandoor">
    </div>

<script>
(() => {
    const balanceEl = document.getElementById('balance');
    const energyTextEl = document.getElementById('energyText');
    const energyBarEl = document.getElementById('energyBar');
    const levelTextEl = document.getElementById('levelText');
    const levelBarEl = document.getElementById('levelBar');
    const playerNameEl = document.getElementById('playerName');
    const tandoorEl = document.getElementById('tandoor');
    const effectLayer = document.getElementById('effect-layer');

    const STORAGE_KEYS = {
        balance: 'tonfarm_balance',
        energy: 'tonfarm_energy',
        name: 'tonfarm_name'
    };

    let balance = parseInt(localStorage.getItem(STORAGE_KEYS.balance) || '0', 10);
    let energy = parseInt(localStorage.getItem(STORAGE_KEYS.energy) || '10', 10);

    let maxEnergy = 10;

    function getLevel(currentBalance) {
        return Math.floor(currentBalance / 10) + 1;
    }

    function getLevelProgress(currentBalance) {
        return currentBalance % 10;
    }

    function getMaxEnergy(level) {
        return 10 + (level - 1) * 2;
    }

    function saveState() {
        localStorage.setItem(STORAGE_KEYS.balance, String(balance));
        localStorage.setItem(STORAGE_KEYS.energy, String(energy));
    }

    function updateUI() {
        const level = getLevel(balance);
        const progress = getLevelProgress(balance);
        maxEnergy = getMaxEnergy(level);

        if (energy > maxEnergy) energy = maxEnergy;

        balanceEl.textContent = balance;
        energyTextEl.textContent = `${energy}/${maxEnergy}`;
        levelTextEl.textContent = level;

        energyBarEl.style.width = `${(energy / maxEnergy) * 100}%`;
        levelBarEl.style.width = `${(progress / 10) * 100}%`;
    }

    function setPlayerName() {
        try {
            if (window.Telegram && Telegram.WebApp) {
                Telegram.WebApp.ready();
                Telegram.WebApp.expand();

                const user = Telegram.WebApp.initDataUnsafe?.user;
                if (user) {
                    const fullName = [user.first_name, user.last_name].filter(Boolean).join(' ');
                    playerNameEl.textContent = fullName || 'Игрок';

                    localStorage.setItem(STORAGE_KEYS.name, fullName || 'Игрок');
                    return;
                }
            }
        } catch (e) {}

        const savedName = localStorage.getItem(STORAGE_KEYS.name);
        if (savedName) {
            playerNameEl.textContent = savedName;
        }
    }

    function spawnSamsa(clientX, clientY) {
        const img = document.createElement('img');
        img.src = 'assets/samsa.png';
        img.className = 'samsa-fly';

        const size = 42;
        const x = Math.max(0, clientX - size / 2);
        const y = Math.max(0, clientY - size / 2);

        img.style.left = `${x}px`;
        img.style.top = `${y}px`;

        effectLayer.appendChild(img);

        setTimeout(() => {
            img.remove();
        }, 950);
    }

    function tap(event) {
        if (energy <= 0) return;

        balance += 1;
        energy -= 1;

        saveState();
        updateUI();

        const rect = tandoorEl.getBoundingClientRect();
        const cx = event?.clientX ?? (rect.left + rect.width / 2);
        const cy = event?.clientY ?? (rect.top + rect.height / 2);

        spawnSamsa(cx, cy);
    }

    tandoorEl.addEventListener('click', tap);
    tandoorEl.addEventListener('touchend', function (e) {
        e.preventDefault();
        const touch = e.changedTouches && e.changedTouches[0];
        tap(touch || e);
    }, { passive: false });

    setPlayerName();
    updateUI();

    setInterval(() => {
        const level = getLevel(balance);
        maxEnergy = getMaxEnergy(level);

        if (energy < maxEnergy) {
            energy += 1;
            saveState();
            updateUI();
        }
    }, 2500);

    document.addEventListener('gesturestart', e => e.preventDefault());
    document.addEventListener('dblclick', e => e.preventDefault());
})();
</script>
</body>
</html>
