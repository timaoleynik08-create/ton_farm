<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>TON Farm</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      margin: 0;
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial;
    }
    .top {
      padding: 20px;
      font-size: 20px;
    }
    .tap {
      margin-top: 100px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: #22c55e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="top">
  💰 Баланс: <span id="bal">0</span><br>
  ⚡ Энергия: <span id="en">10</span>
</div>

<div class="tap" onclick="tap()">TAP</div>

<script>
let balance = 0;
let energy = 10;

function tap(){
  if(energy <= 0){
    alert("Нет энергии!");
    return;
  }

  balance++;
  energy--;

  document.getElementById("bal").innerText = balance;
  document.getElementById("en").innerText = energy;
}

setInterval(()=>{
  if(energy < 10){
    energy++;
    document.getElementById("en").innerText = energy;
  }
}, 3000);
</script>

</body>
</html>
