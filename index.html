<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>TON Farm</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root{
    --text:#fff;
    --gold1:#ffcb45;
    --gold2:#ff9f1a;
}

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
    color:var(--text);
    background:url("assets/bg.jpg") center center / cover no-repeat fixed;
    touch-action:manipulation;
}

*{
    box-sizing:border-box;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:linear-gradient(
        180deg,
        rgba(0,0,0,.35),
        rgba(0,0,0,.15)
    );
    pointer-events:none;
}

.top{
    position:relative;
    z-index:5;
    padding:14px 14px 0;
    text-align:center;
}

.name{
    font-size:28px;
    font-weight:700;
    margin-bottom:12px;
    text-shadow:0 2px 10px rgba(0,0,0,.4);
}

.stat{
    font-size:18px;
    margin:10px 0 6px;
}

.bar{
    width:min(78vw,520px);
    height:12px;
    background:rgba(255,255,255,.18);
    margin:0 auto 16px;
    border-radius:999px;
    overflow:hidden;
}

.fill{
    height:100%;
    width:0%;
    background:linear-gradient(
        90deg,
        var(--gold1),
        var(--gold2)
    );
    border-radius:999px;
}

.shop-button,
.music-button{
    position:fixed;
    top:10px;
    z-index:50;
    border:none;
    border-radius:16px;
    background:rgba(255,255,255,.12);
    color:white;
    font-size:16px;
    padding:12px 14px;
    font-weight:700;
    backdrop-filter:blur(10px);
}

.shop-button{
    right:10px;
}

.music-button{
    left:10px;
}

.game-area{
    position:fixed;
    left:0;
    right:0;
    bottom:24px;
    display:flex;
    justify-content:center;
    z-index:5;
}

#tandoor{
    width:min(64vw,280px);
    max-width:280px;
    background:none;
    border:none;
    padding:0;
}

#tandoor img{
    width:100%;
    object-fit:contain;
}

#tandoor:active{
    transform:scale(.95);
}

#girl{
    position:fixed;
    right:5vw;
    bottom:30px;
    width:min(32vw,180px);
    max-width:180px;
    display:none;
    z-index:4;
}

#effect-layer{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:20;
}

.samsa-fly{
    position:absolute;
    width:42px;
    height:42px;
    animation:flyUp .9s ease-out forwards;
}

@keyframes flyUp{
    0%{
        transform:translateY(0) scale(1);
        opacity:1;
    }

    100%{
        transform:translateY(-160px) scale(.55);
        opacity:0;
    }
}

.modal{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.62);
    backdrop-filter:blur(8px);
    z-index:100;
    padding:18px;
}

.modal-content{
    width:min(92vw,430px);
    border-radius:28px;
    padding:18px;
    color:white;
    background:linear-gradient(
        180deg,
        rgba(19,40,80,.98),
        rgba(9,21,43,.98)
    );
}

.modal-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
}

.close{
    font-size:30px;
    cursor:pointer;
}

.shop-card{
    background:rgba(255,255,255,.08);
    border-radius:24px;
    padding:16px;
}

.shop-preview{
    display:flex;
    justify-content:center;
    margin-bottom:12px;
}

.shop-preview img{
    width:160px;
}

.shop-title{
    text-align:center;
    font-size:18px;
    font-weight:700;
    margin-bottom:6px;
}

.shop-meta{
    text-align:center;
    color:rgba(255,255,255,.8);
    font-size:15px;
    line-height:1.5;
    margin-bottom:14px;
}

.shop-actions button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:16px;
    font-size:16px;
    font-weight:700;
    color:white;
    margin-top:10px;
}

.primary-btn{
    background:linear-gradient(
        90deg,
        #ffb000,
        #ff8a00
    );
}

.secondary-btn{
    background:rgba(255,255,255,.12);
}
</style>
</head>

<body>

<button class="music-button" id="musicBtn">🔊</button>
<button class="shop-button" id="shopBtn">🛒</button>

<audio id="bgMusic" loop>
    <source src="assets/music.mp3" type="audio/mpeg">
</audio>

<div class="top">

    <div class="name" id="playerName">
        Игрок
    </div>

    <div class="stat">
        💰 Баланс:
        <span id="balance">0</span>
    </div>

    <div class="stat">
        ⚡ Энергия:
        <span id="energyText">10/10</span>
    </div>

    <div class="bar">
        <div id="energyBar" class="fill"></div>
    </div>

    <div class="stat">
        📈 Уровень:
        <span id="levelText">1</span>
    </div>

    <div class="bar">
        <div id="levelBar" class="fill"></div>
    </div>

</div>

<div id="effect-layer"></div>

<div class="game-area">

    <button id="tandoor">
        <img src="assets/tandoor.png">
    </button>

</div>

<img id="girl" src="">

<div id="shopModal" class="modal">

    <div class="modal-content">

        <div class="modal-head">
            <h2>🛒 Магазин</h2>
            <div class="close" id="closeModal">
                ×
            </div>
        </div>

        <div class="shop-card">

            <div class="shop-preview">
                <img id="itemGirlImg" src="assets/girl1.png">
            </div>

            <div class="shop-title">
                Девушка-помощница
            </div>

            <div class="shop-meta">
                Уровень:
                <span id="girlLevelDisplay">0</span>/10
                <br>

                Доход:
                +<span id="girlIncomeDisplay">0</span>/сек
                <br>

                Цена:
                <span id="girlPrice">1000</span>
            </div>

            <div class="shop-actions">

                <button id="buyGirlBtn" class="primary-btn">
                    Купить
                </button>

                <button id="upgradeGirlBtn"
                class="secondary-btn"
                style="display:none;">
                    Улучшить
                </button>

            </div>

        </div>

    </div>

</div>

<script>
(() => {

const balanceEl = document.getElementById('balance');
const energyTextEl = document.getElementById('energyText');
const energyBarEl = document.getElementById('energyBar');
const levelTextEl = document.getElementById('levelText');
const levelBarEl = document.getElementById('levelBar');
const playerNameEl = document.getElementById('playerName');

const tandoorEl = document.getElementById('tandoor');
const girlEl = document.getElementById('girl');
const effectLayer = document.getElementById('effect-layer');

const shopBtn = document.getElementById('shopBtn');
const musicBtn = document.getElementById('musicBtn');
const bgMusic = document.getElementById('bgMusic');

const shopModal = document.getElementById('shopModal');
const closeModal = document.getElementById('closeModal');

const buyGirlBtn = document.getElementById('buyGirlBtn');
const upgradeGirlBtn = document.getElementById('upgradeGirlBtn');

const girlLevelDisplay = document.getElementById('girlLevelDisplay');
const girlPriceDisplay = document.getElementById('girlPrice');
const girlIncomeDisplay = document.getElementById('girlIncomeDisplay');

const itemGirlImg = document.getElementById('itemGirlImg');

const girlPrices = [
0,
1000,
2000,
5000,
10000,
20000,
50000,
100000,
200000,
500000,
1000000
];

const girlIncome = [
0,
1,
2,
4,
7,
12,
18,
26,
38,
52,
75
];

let balance =
parseInt(localStorage.getItem("balance")) || 0;

let energy =
parseInt(localStorage.getItem("energy")) || 10;

let girlBought =
localStorage.getItem("girlBought") === "true";

let girlLevel =
parseInt(localStorage.getItem("girlLevel")) || 0;

let musicEnabled =
localStorage.getItem("music") !== "off";

function getLevel(){
    return Math.floor(balance / 10) + 1;
}

function getMaxEnergy(){
    return 10 + (getLevel() - 1) * 2;
}

function saveGame(){

    localStorage.setItem("balance", balance);
    localStorage.setItem("energy", energy);
    localStorage.setItem("girlBought", girlBought);
    localStorage.setItem("girlLevel", girlLevel);

}

function updateUI(){

    let level = getLevel();
    let maxEnergy = getMaxEnergy();

    if(energy > maxEnergy){
        energy = maxEnergy;
    }

    balanceEl.innerText = balance;

    energyTextEl.innerText =
    energy + "/" + maxEnergy;

    levelTextEl.innerText = level;

    energyBarEl.style.width =
    (energy / maxEnergy * 100) + "%";

    levelBarEl.style.width =
    ((balance % 10) / 10 * 100) + "%";

}

function setPlayerName(){

    if(window.Telegram?.WebApp){

        Telegram.WebApp.ready();

        let user =
        Telegram.WebApp.initDataUnsafe.user;

        if(user){

            playerNameEl.innerText =
            user.first_name;

        }

    }

}

function refreshGirlUI(){

    girlLevelDisplay.innerText = girlLevel;

    girlIncomeDisplay.innerText =
    girlLevel > 0
    ? girlIncome[girlLevel]
    : 0;

    if(!girlBought){

        buyGirlBtn.style.display = "block";
        upgradeGirlBtn.style.display = "none";

        girlPriceDisplay.innerText =
        girlPrices[1];

        itemGirlImg.src =
        "assets/girl1.png";

    } else {

        buyGirlBtn.style.display = "none";

        if(girlLevel < 10){

            upgradeGirlBtn.style.display =
            "block";

            let nextLevel = girlLevel + 1;

            girlPriceDisplay.innerText =
            girlPrices[nextLevel];

            upgradeGirlBtn.innerText =
            "Улучшить до " + nextLevel;

        } else {

            upgradeGirlBtn.style.display =
            "none";

            girlPriceDisplay.innerText = "MAX";

        }

        itemGirlImg.src =
        `assets/girl${girlLevel}.png`;

    }

    if(girlBought){

        girlEl.src =
        `assets/girl${girlLevel}.png`;

        girlEl.style.display = "block";

    }

}

function spawnSamsa(x,y){

    let img = document.createElement("img");

    img.src = "assets/samsa.png";

    img.className = "samsa-fly";

    img.style.left = (x - 21) + "px";
    img.style.top = (y - 21) + "px";

    effectLayer.appendChild(img);

    setTimeout(() => {
        img.remove();
    }, 900);

}

function tap(event){

    if(energy <= 0) return;

    balance += 1;

    energy -= 1;

    updateUI();

    saveGame();

    spawnSamsa(
        event.clientX,
        event.clientY
    );

    tryStartMusic();

}

function autoIncomeTick(){

    if(!girlBought) return;

    if(girlLevel <= 0) return;

    balance += Number(
        girlIncome[girlLevel]
    );

    updateUI();

    saveGame();

}

function tryStartMusic(){

    if(!musicEnabled) return;

    bgMusic.volume = 0.35;

    bgMusic.play().catch(() => {});

}

musicBtn.onclick = () => {

    if(bgMusic.paused){

        bgMusic.play();

        musicEnabled = true;

        localStorage.setItem(
            "music",
            "on"
        );

        musicBtn.innerText = "🔊";

    } else {

        bgMusic.pause();

        musicEnabled = false;

        localStorage.setItem(
            "music",
            "off"
        );

        musicBtn.innerText = "🔇";

    }

};

shopBtn.onclick = () => {

    shopModal.style.display = "flex";

};

closeModal.onclick = () => {

    shopModal.style.display = "none";

};

buyGirlBtn.onclick = () => {

    if(balance >= girlPrices[1]){

        balance -= girlPrices[1];

        girlBought = true;

        girlLevel = 1;

        updateUI();

        refreshGirlUI();

        saveGame();

    }

};

upgradeGirlBtn.onclick = () => {

    let nextLevel = girlLevel + 1;

    if(nextLevel > 10) return;

    if(balance >= girlPrices[nextLevel]){

        balance -= girlPrices[nextLevel];

        girlLevel = nextLevel;

        updateUI();

        refreshGirlUI();

        saveGame();

    }

};

tandoorEl.addEventListener("click",(e)=>{

    tap(e);

});

tandoorEl.addEventListener("touchend",(e)=>{

    e.preventDefault();

    let t = e.changedTouches[0];

    tap(t);

},{passive:false});

setPlayerName();

updateUI();

refreshGirlUI();

if(musicEnabled){

    document.body.addEventListener(
        "pointerdown",
        tryStartMusic,
        {once:true}
    );

}

setInterval(() => {

    let maxEnergy = getMaxEnergy();

    if(energy < maxEnergy){

        energy++;

        updateUI();

        saveGame();

    }

},1000);

setInterval(autoIncomeTick,1000);

})();
</script>

</body>
</html>
