<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>TON Farm</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(#0b1f3a, #1e3c72);
    color: white;
    text-align: center;
    overflow: hidden;
}

h1 {
    margin-top: 10px;
}

.bar {
    width: 80%;
    height: 12px;
    background: #333;
    margin: 10px auto;
    border-radius: 10px;
}

.fill {
    height: 100%;
    width: 0%;
    background: orange;
    border-radius: 10px;
}

#game {
    margin-top: 20px;
}

#tandoor {
    width: 220px;
    user-select: none;
    touch-action: manipulation;
}

.samsa {
    position: absolute;
    width: 40px;
    pointer-events: none;
    animation: fly 1s forwards;
}

@keyframes fly {
    from {
        transform: translateY(0);
        opacity: 1;
    }
    to {
        transform: translateY(-120px);
        opacity: 0;
    }
}
</style>
</head>

<body>

<h1 id="name">Игрок</h1>

<div>💰 Баланс: <span id="money">0</span></div>

<div>⚡ Энергия: <span id="energyText">100</span>/100</div>
<div class="bar"><div id="energyBar" class="fill"></div></div>

<div>📈 Уровень: <span id="level">1</span></div>
<div class="bar"><div id="levelBar" class="fill"></div></div>

<div id="game">
    <img id="tandoor" src="assets/tandoor.png">
</div>

<script>

// ===== TELEGRAM =====
if (window.Telegram && Telegram.WebApp) {
    Telegram.WebApp.expand();

    const user = Telegram.WebApp.initDataUnsafe?.user;
    if (user) {
        document.getElementById("name").innerText = user.first_name;
    }
}

// ===== ДАННЫЕ =====
let money = parseInt(localStorage.getItem("money")) || 0;
let energy = parseInt(localStorage.getItem("energy")) || 100;

// уровень считается от денег
let level = Math.floor(money / 100) + 1;

// ===== UI =====
function updateUI() {
    document.getElementById("money").innerText = money;
    document.getElementById("energyText").innerText = energy;
    document.getElementById("energyBar").style.width = energy + "%";

    // уровень
    level = Math.floor(money / 100) + 1;
    document.getElementById("level").innerText = level;

    let progress = money % 100;
    document.getElementById("levelBar").style.width = progress + "%";
}

updateUI();

// ===== КЛИК =====
const tandoor = document.getElementById("tandoor");

tandoor.addEventListener("click", (e) => {

    if (energy <= 0) return;

    energy -= 1;
    money += 1;

    // сохранение
    localStorage.setItem("money", money);
    localStorage.setItem("energy", energy);

    updateUI();

    // самса
    const img = document.createElement("img");
    img.src = "assets/samsa.png";
    img.className = "samsa";

    img.style.left = (e.clientX - 20) + "px";
    img.style.top = (e.clientY - 20) + "px";

    document.body.appendChild(img);

    setTimeout(() => img.remove(), 1000);
});

// ===== РЕГЕН ЭНЕРГИИ =====
setInterval(() => {
    if (energy < 100) {
        energy += 1;
        localStorage.setItem("energy", energy);
        updateUI();
    }
}, 2000);

</script>

</body>
</html>
