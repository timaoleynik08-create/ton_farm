<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Samsa Tap</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(180deg, #0f172a, #1e3a8a);
    color: white;
    text-align: center;
}

/* верхняя панель */
.top {
    margin-top: 20px;
    font-size: 18px;
}

/* тандыр */
#tandoor {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);

  width: 180px;
  height: 180px;
  border-radius: 50%;

  background: radial-gradient(circle, #ff7b00, #5a1a00);
  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 60px;
  cursor: pointer;
  box-shadow: 0 0 40px orange;
  transition: transform 0.1s;
}

#tandoor:active {
  transform: translateX(-50%) scale(0.9);
}

/* эффект самсы */
#effect span {
  position: absolute;
  font-size: 28px;
  animation: fly 1s forwards;
}

@keyframes fly {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-120px); opacity: 0; }
}
</style>
</head>

<body>

<div class="top">
  💰 Баланс: <span id="balance">0</span><br>
  ⚡ Энергия: <span id="energy">10</span><br>
  📈 Уровень: <span id="level">1</span>
</div>

<!-- тандыр -->
<div id="tandoor" onclick="tap()">🔥</div>

<div id="effect"></div>

<script>
// данные
let balance = 0;
let energy = 10;
let level = 1;
let maxEnergy = 10;

// загрузка
if (localStorage.getItem("balance")) {
    balance = parseInt(localStorage.getItem("balance"));
}
if (localStorage.getItem("energy")) {
    energy = parseInt(localStorage.getItem("energy"));
}
if (localStorage.getItem("level")) {
    level = parseInt(localStorage.getItem("level"));
}
if (localStorage.getItem("maxEnergy")) {
    maxEnergy = parseInt(localStorage.getItem("maxEnergy"));
}

// обновление
function updateUI() {
    document.getElementById("balance").innerText = balance;
    document.getElementById("energy").innerText = energy;
    document.getElementById("level").innerText = level;
}

// сохранение
function save() {
    localStorage.setItem("balance", balance);
    localStorage.setItem("energy", energy);
    localStorage.setItem("level", level);
    localStorage.setItem("maxEnergy", maxEnergy);
}

// тап
function tap() {
    if (energy <= 0) return;

    balance += 1;
    energy -= 1;

    // уровень
    if (balance >= level * 10) {
        level += 1;
        maxEnergy += 2;
    }

    updateUI();
    save();
    spawnSamsa();
}

// самса эффект
function spawnSamsa() {
    const effect = document.getElementById("effect");

    let el = document.createElement("span");
    el.innerText = "🥟";

    el.style.left = Math.random() * 100 + "%";
    el.style.bottom = "120px";

    effect.appendChild(el);

    setTimeout(() => el.remove(), 1000);
}

// восстановление энергии
setInterval(() => {
    if (energy < maxEnergy) {
        energy += 1;
        updateUI();
        save();
    }
}, 3000);

// старт
updateUI();
</script>

</body>
</html>
