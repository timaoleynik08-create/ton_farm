<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Samsa Tap</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(180deg, #0f172a, #1e3a8a);
    color: white;
    text-align: center;
    overflow: hidden;
    touch-action: manipulation;
}

/* верх */
.top {
    margin-top: 20px;
    font-size: 18px;
}

/* полоски */
.bar {
    width: 80%;
    height: 12px;
    background: #333;
    margin: 8px auto;
    border-radius: 10px;
    overflow: hidden;
}

.fill {
    height: 100%;
    background: orange;
    width: 50%;
}

/* тандыр */
#tandoor {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 220px;
    height: 220px;
}

#tandoor img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
}

/* эффект */
#effect img {
    position: absolute;
    width: 30px;
    animation: fly 1s forwards;
}

@keyframes fly {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-120px); opacity: 0; }
}
</style>
</head>

<body>

<div class="top">
    <div id="name">Игрок</div>
    💰 Баланс: <span id="balance">0</span>

    <div>⚡ Энергия</div>
    <div class="bar"><div id="energyBar" class="fill"></div></div>

    <div>📈 Уровень</div>
    <div class="bar"><div id="levelBar" class="fill"></div></div>
</div>

<div id="effect"></div>

<div id="tandoor" onclick="tap()">
    <img src="assets/tandoor.png">
</div>

<script>
let balance = 0;
let energy = 10;
let level = 1;
let maxEnergy = 10;

// имя из Telegram
if (window.Telegram?.WebApp) {
    let user = Telegram.WebApp.initDataUnsafe.user;
    if (user) {
        document.getElementById("name").innerText = user.first_name;
    }
}

// загрузка
balance = parseInt(localStorage.getItem("balance")) || 0;
energy = parseInt(localStorage.getItem("energy")) || 10;
level = parseInt(localStorage.getItem("level")) || 1;
maxEnergy = parseInt(localStorage.getItem("maxEnergy")) || 10;

// обновление
function updateUI() {
    document.getElementById("balance").innerText = balance;

    document.getElementById("energyBar").style.width =
        (energy / maxEnergy * 100) + "%";

    document.getElementById("levelBar").style.width =
        (balance % (level * 10)) / (level * 10) * 100 + "%";
}

// сохранение
function save() {
    localStorage.setItem("balance", balance);
    localStorage.setItem("energy", energy);
    localStorage.setItem("level", level);
    localStorage.setItem("maxEnergy", maxEnergy);
}

// тап
function tap() {
    if (energy <= 0) return;

    balance++;
    energy--;

    if (balance >= level * 10) {
        level++;
        maxEnergy += 2;
    }

    updateUI();
    save();
    spawnSamsa();
}

// самса эффект
function spawnSamsa() {
    let el = document.createElement("img");
    el.src = "assets/samsa.png";

    el.style.left = Math.random() * 80 + 10 + "%";
    el.style.bottom = "140px";

    document.getElementById("effect").appendChild(el);

    setTimeout(() => el.remove(), 1000);
}

// энергия восстанавливается
setInterval(() => {
    if (energy < maxEnergy) {
        energy++;
        updateUI();
        save();
    }
}, 3000);

// запрет zoom двойным тапом
let lastTouchEnd = 0;
document.addEventListener('touchend', function (event) {
    let now = (new Date()).getTime();
    if (now - lastTouchEnd <= 300) {
        event.preventDefault();
    }
    lastTouchEnd = now;
}, false);

// старт
updateUI();
</script>

</body>
</html>
