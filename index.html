<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>TON Farm</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(#0b1e3f, #1c3d7a);
    font-family: Arial;
    text-align: center;
    color: white;
    overflow: hidden;
    touch-action: manipulation;
}

.top {
    padding: 20px;
}

.bar {
    width: 80%;
    height: 10px;
    background: #333;
    margin: 10px auto;
    border-radius: 10px;
    overflow: hidden;
}

.fill {
    height: 100%;
    background: orange;
    width: 50%;
}

#tandoor {
    width: 220px;
    margin-top: 50px;
    transition: transform 0.1s;
}

#tandoor:active {
    transform: scale(0.95);
}

.samsa {
    position: absolute;
    width: 40px;
    pointer-events: none;
    animation: fly 1s forwards;
}

@keyframes fly {
    0% {
        transform: translateY(0) scale(1);
        opacity: 1;
    }
    100% {
        transform: translateY(-120px) scale(0.5);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="top">
    <h2 id="name">Игрок</h2>
    💰 Баланс: <span id="balance">0</span><br><br>

    ⚡ Энергия
    <div class="bar"><div id="energyBar" class="fill"></div></div>

    📈 Уровень
    <div class="bar"><div id="levelBar" class="fill"></div></div>
</div>

<img id="tandoor" src="assets/tandoor.png">

<script>
let balance = 0;
let energy = 100;
let level = 1;

const balanceEl = document.getElementById("balance");
const energyBar = document.getElementById("energyBar");
const levelBar = document.getElementById("levelBar");
const tandoor = document.getElementById("tandoor");

// имя из Telegram (если есть)
if (window.Telegram?.WebApp) {
    const user = Telegram.WebApp.initDataUnsafe.user;
    if (user) {
        document.getElementById("name").innerText = user.first_name;
    }
}

function updateUI() {
    balanceEl.innerText = balance;
    energyBar.style.width = energy + "%";
    levelBar.style.width = (balance % 100) + "%";
}

tandoor.addEventListener("click", (e) => {

    if (energy <= 0) return;

    balance += 1;
    energy -= 1;

    // уровень
    if (balance % 100 === 0) {
        level++;
    }

    updateUI();

    // анимация самсы
    const img = document.createElement("img");
    img.src = "assets/samsa.png";
    img.className = "samsa";

    img.style.left = e.clientX - 20 + "px";
    img.style.top = e.clientY - 20 + "px";

    document.body.appendChild(img);

    setTimeout(() => img.remove(), 1000);
});

// восстановление энергии
setInterval(() => {
    if (energy < 100) {
        energy += 1;
        updateUI();
    }
}, 1000);

updateUI();
</script>

</body>
</html>
